<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- waveform with a gap/break in the middle -->
  <g opacity="0.05" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round">
    <polyline points="730,315 760,255 790,375 820,255 850,375"/>
    <!-- gap here -->
