  </g>
  <rect x="0" y="0" width="1200" height="5" fill="#FF6B2B"/>
  <rect x="60" y="78" width="3" height="28" fill="#FF6B2B"/>
  <text x="72" y="99" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FF6B2B" letter-spacing="4">AI &amp; AUTOMATION</text>
  <text x="60" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Vague Prompts Don't Fail Loudly.</text>
  <text x="60" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">They Fail Quietly</text>
  <text x="60" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">and That's the Problem.</text>
