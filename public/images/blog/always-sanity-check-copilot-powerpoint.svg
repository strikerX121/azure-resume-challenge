  <text x="60" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">PowerPoint Is the One Copilot</text>
  <text x="60" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Output You Should</text>
  <text x="60" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Always Double-Check</text>
  <line x1="60" y1="585" x2="1140" y2="585" stroke="#1E1E1E" stroke-width="1"/>
  <text x="1140" y="608" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6B7280" text-anchor="end">antoniocumberbatch.com</text>
