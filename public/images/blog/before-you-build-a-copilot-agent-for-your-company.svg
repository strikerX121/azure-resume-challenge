<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <g opacity="0.035" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/><line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
  </g>
  <!-- bot / agent icon -->
  <g opacity="0.05" fill="none" stroke="#ffffff" stroke-width="6">
    <!-- head -->
    <rect x="805" y="200" width="150" height="130" rx="20"/>
    <!-- antenna -->
    <line x1="880" y1="200" x2="880" y2="165"/>
    <circle cx="880" cy="158" r="10" fill="#ffffff" stroke="none"/>
    <!-- eyes -->
    <circle cx="845" cy="248" r="14" fill="#ffffff" stroke="none"/>
    <circle cx="915" cy="248" r="14" fill="#ffffff" stroke="none"/>
    <!-- mouth line -->
    <line x1="848" y1="295" x2="912" y2="295" stroke-linecap="round"/>
    <!-- body -->
    <rect x="820" y="345" width="120" height="80" rx="10"/>
    <!-- arms -->
    <line x1="820" y1="360" x2="775" y2="390"/>
    <line x1="940" y1="360" x2="985" y2="390"/>
  </g>
  <!-- warning triangle hint -->
  <g opacity="0.08" fill="#FF6B2B">
    <polygon points="1040,185 1070,235 1010,235"/>
    <text x="1028" y="231" font-family="system-ui,sans-serif" font-size="28" font-weight="900" fill="#0A0A0A">!</text>
  </g>
  <rect x="0" y="0" width="1200" height="5" fill="#FF6B2B"/>
  <rect x="60" y="78" width="3" height="28" fill="#FF6B2B"/>
  <text x="72" y="99" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#FF6B2B" letter-spacing="4">AI &amp; AUTOMATION</text>
  <text x="60" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Before You Build a Copilot</text>
  <text x="60" y="246" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Agent for Your Whole</text>
  <text x="60" y="307" font-family="system-ui,-apple-system,sans-serif" font-size="46" font-weight="800" fill="#F0EEE8">Company, Read This</text>
  <line x1="60" y1="585" x2="1140" y2="585" stroke="#1E1E1E" stroke-width="1"/>
  <text x="1140" y="608" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#6B7280" text-anchor="end">antoniocumberbatch.com</text>
</svg>
